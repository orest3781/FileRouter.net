name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest   # the app targets net8.0-windows (WPF + WebView2)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
      # every push gets a downloadable portable exe (Actions run → Artifacts)
      - name: Publish portable exe
        run: >
          dotnet publish src/FileRouter.Wpf -c Release -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o out/portable
      - uses: actions/upload-artifact@v4
        with:
          name: FileRouter-portable-win-x64
          path: out/portable/FileRouter.Wpf.exe

  smoke:
    # the UI proofs: real WebView2 releases the PDF handle before the move,
    # double-fire commits exactly once, every window constructs cleanly
    runs-on: windows-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Dialogs
        run: dotnet run --project tools/FileRouter.Smoke -- dialogs
      - name: Reentrancy
        run: dotnet run --project tools/FileRouter.Smoke -- reentrancy
      - name: Filing loop
        run: dotnet run --project tools/FileRouter.Smoke
