name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'copilot/merge-release-workflow-changes'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            # Triggered by branch push — auto-compute next version
            LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
            if [ -z "$LATEST" ]; then
              echo "name=v1.0.0" >> "$GITHUB_OUTPUT"
            else
              PATCH=$(echo "$LATEST" | awk -F. '{print $3}')
              MAJOR=$(echo "$LATEST" | awk -F. '{print $1}' | tr -d 'v')
              MINOR=$(echo "$LATEST" | awk -F. '{print $2}')
              echo "name=v${MAJOR}.${MINOR}.$((PATCH+1))" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained exe
        run: >
          dotnet publish src/FileRouter.App/FileRouter.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: publish/FileRouter.App.exe
          generate_release_notes: true
