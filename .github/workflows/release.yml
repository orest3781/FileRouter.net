name: Release

# Tag a version (v1.0.0) and push it — this builds, tests, and attaches the
# portable exes to a GitHub release. Manual runs upload workflow artifacts
# instead of creating a release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test
        run: dotnet test -c Release --verbosity normal

      - name: Version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d') { $tag = "v0.0.0-dev" }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      # ~5 MB: the .NET 8 Desktop Runtime and WebView2 are already on modern
      # Windows (the app's whole design bet). Windows shows a download link
      # for the runtime if it's missing.
      - name: Publish portable exe
        run: >
          dotnet publish src/FileRouter.Wpf -c Release -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -p:Version=${{ steps.ver.outputs.version }}
          -o out/portable

      # ~70 MB: carries the whole runtime — for machines where installing
      # anything is not an option.
      - name: Publish self-contained exe
        run: >
          dotnet publish src/FileRouter.Wpf -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:Version=${{ steps.ver.outputs.version }}
          -o out/selfcontained

      # Code signing via Azure Trusted Signing — switches on automatically
      # once the six AZURE_* secrets exist in the repo (Settings > Secrets).
      # Until then, releases ship unsigned and this step is skipped.
      # Enrollment: create a Trusted Signing account + identity validation +
      # certificate profile in the Azure portal, then an app registration
      # (client id/secret) with the Trusted Signing Certificate Profile
      # Signer role. Docs: https://learn.microsoft.com/azure/trusted-signing/
      - name: Sign the exes (when signing is configured)
        if: ${{ startsWith(github.ref, 'refs/tags/') && secrets.AZURE_TENANT_ID != '' }}
        uses: azure/trusted-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: out
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # zips download cleaner than bare exes (browsers and SmartScreen are
      # kinder to archives), and they carry a proper inner filename
      - name: Zip the assets
        shell: pwsh
        run: |
          Copy-Item out/portable/FileRouter.Wpf.exe FileRouter.exe
          Compress-Archive -Path FileRouter.exe -DestinationPath "FileRouter-${{ steps.ver.outputs.tag }}-win-x64.zip"
          Remove-Item FileRouter.exe
          Copy-Item out/selfcontained/FileRouter.Wpf.exe FileRouter.exe
          Compress-Archive -Path FileRouter.exe -DestinationPath "FileRouter-${{ steps.ver.outputs.tag }}-win-x64-selfcontained.zip"
          Remove-Item FileRouter.exe

      - name: Create the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ steps.ver.outputs.tag }}"
          "FileRouter-${{ steps.ver.outputs.tag }}-win-x64.zip"
          "FileRouter-${{ steps.ver.outputs.tag }}-win-x64-selfcontained.zip"
          --title "FileRouter ${{ steps.ver.outputs.tag }}"
          --generate-notes

      - name: Upload workflow artifacts (manual run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: FileRouter-win-x64
          path: FileRouter-*.zip
