name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest   # the App targets net8.0-windows (WinForms + WebView2)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
